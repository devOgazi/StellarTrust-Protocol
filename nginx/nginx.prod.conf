# nginx/nginx.prod.conf
# Reverse proxy for StellarTrust production stack.
# Terminates TLS; proxies to frontend (:3000), backend (:4000), IPFS (:8080).
#
# Place your TLS certificate and key at:
#   nginx/certs/stellartrust.crt
#   nginx/certs/stellartrust.key
#
# Replace 'yourdomain.com' with your actual domain.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Rate limiting zone (shared with Express, belt-and-suspenders)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;

        ssl_certificate     /etc/nginx/certs/stellartrust.crt;
        ssl_certificate_key /etc/nginx/certs/stellartrust.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ── Backend API — /api/v1 ────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Backend health + OpenAPI docs
        location ~ ^/(health|docs) {
            proxy_pass         http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── IPFS gateway — /ipfs/ ────────────────────────────────────────
        location /ipfs/ {
            proxy_pass         http://ipfs:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
        }

        # ── Frontend — everything else ───────────────────────────────────
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
