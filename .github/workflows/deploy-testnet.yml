name: Deploy to Testnet

# Trigger: every push to the `develop` branch after tests pass.
on:
  push:
    branches: [develop]

# Only one deployment runs at a time on this branch.
concurrency:
  group: deploy-testnet
  cancel-in-progress: false   # queue, don't cancel — each deploy must finish

jobs:
  # ── 1. Run the full test suite first ──────────────────────────────────────
  #       (mirrors test.yml; kept inline so this workflow is self-contained)
  test:
    name: Verify tests pass
    uses: ./.github/workflows/test.yml

  # ── 2. Deploy Soroban contracts to Stellar testnet ────────────────────────
  deploy-contracts:
    name: Deploy contracts to Stellar testnet
    runs-on: ubuntu-latest
    needs: test
    environment: testnet

    outputs:
      identity_contract_id: ${{ steps.deploy.outputs.identity_contract_id }}
      score_contract_id:    ${{ steps.deploy.outputs.score_contract_id }}
      registry_contract_id: ${{ steps.deploy.outputs.registry_contract_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deploy-

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build contracts
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy contracts and capture IDs
        id: deploy
        env:
          STELLAR_SECRET_KEY: ${{ secrets.TESTNET_SECRET_KEY }}
        run: |
          WASM_DIR="contracts/target/wasm32-unknown-unknown/release"
          NETWORK="testnet"

          # Upload + deploy each contract; capture the last line of output = contract ID
          deploy_contract() {
            local wasm_file="$1"
            local wasm_hash
            wasm_hash=$(stellar contract upload \
              --wasm "$wasm_file" \
              --source "$STELLAR_SECRET_KEY" \
              --network "$NETWORK" 2>&1 | tail -1)
            stellar contract deploy \
              --wasm-hash "$wasm_hash" \
              --source "$STELLAR_SECRET_KEY" \
              --network "$NETWORK" 2>&1 | tail -1
          }

          REGISTRY_ID=$(deploy_contract "$WASM_DIR/stellartrust_registry.wasm")
          IDENTITY_ID=$(deploy_contract "$WASM_DIR/stellartrust_identity.wasm")
          SCORE_ID=$(deploy_contract    "$WASM_DIR/stellartrust_credit_score.wasm")

          echo "identity_contract_id=$IDENTITY_ID"  >> "$GITHUB_OUTPUT"
          echo "score_contract_id=$SCORE_ID"         >> "$GITHUB_OUTPUT"
          echo "registry_contract_id=$REGISTRY_ID"  >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Testnet deployment complete ==="
          echo "IDENTITY_CONTRACT_ID  = $IDENTITY_ID"
          echo "SCORE_CONTRACT_ID     = $SCORE_ID"
          echo "REGISTRY_CONTRACT_ID  = $REGISTRY_ID"

  # ── 3. Build and push Docker images ──────────────────────────────────────
  build-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: deploy-contracts
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stellartrust-backend:testnet
            ghcr.io/${{ github.repository_owner }}/stellartrust-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stellartrust-frontend:testnet
            ghcr.io/${{ github.repository_owner }}/stellartrust-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-testnet.stellartrust.io/api/v1
            NEXT_PUBLIC_STELLAR_NETWORK=testnet
            NEXT_PUBLIC_STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
            NEXT_PUBLIC_IPFS_GATEWAY=https://ipfs-testnet.stellartrust.io
            NEXT_PUBLIC_IDENTITY_CONTRACT_ID=${{ needs.deploy-contracts.outputs.identity_contract_id }}
            NEXT_PUBLIC_SCORE_CONTRACT_ID=${{ needs.deploy-contracts.outputs.score_contract_id }}
            NEXT_PUBLIC_REGISTRY_CONTRACT_ID=${{ needs.deploy-contracts.outputs.registry_contract_id }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. Summary ────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy-contracts, build-images]

    steps:
      - name: Post deployment summary
        run: |
          echo "## ✅ Testnet Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Identity | \`${{ needs.deploy-contracts.outputs.identity_contract_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Credit Score | \`${{ needs.deploy-contracts.outputs.score_contract_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ needs.deploy-contracts.outputs.registry_contract_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Docker images tagged: \`testnet\` and \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
